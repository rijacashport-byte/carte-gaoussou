<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gaoussou CISSE – Nestlé</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #3E2A1A;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .card {
    background: #FFF8F0;
    border-radius: 24px;
    width: 100%;
    max-width: 400px;
    padding: 28px 24px 24px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    border: 3px solid #8B6914;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .nestle-header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    gap: 12px;
  }
  .logo-img {
    width: 70px; height: 70px;
    object-fit: contain;
    filter: drop-shadow(1px 2px 4px rgba(0,0,0,0.15));
  }
  .nestle-brand { display: flex; flex-direction: column; }
  .nestle-name {
    font-size: 32px; font-weight: 800;
    color: #8B6914; letter-spacing: 1px; line-height: 1;
  }
  .nestle-tagline {
    font-size: 10px; color: #A07820;
    letter-spacing: 2px; text-transform: uppercase; margin-top: 2px;
  }
  .divider {
    width: 100%; height: 2px;
    background: linear-gradient(to right, transparent, #8B6914, transparent);
    margin-bottom: 16px;
  }
  .identity { text-align: center; margin-bottom: 16px; }
  .identity .name {
    font-size: 24px; font-weight: 800;
    color: #3E2A1A; letter-spacing: 0.5px;
  }
  .identity .title {
    font-size: 13px; color: #8B6914;
    margin-top: 5px; font-weight: 600;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .scan-hint {
    display: flex; align-items: center; gap: 6px;
    justify-content: center; font-size: 12px;
    color: #8B6914; font-weight: 600;
    margin-bottom: 10px; opacity: 0.8;
  }
  .qr-zone {
    background: white; border-radius: 14px;
    padding: 12px; border: 2px solid #8B6914;
    margin-bottom: 16px;
    box-shadow: 0 4px 12px rgba(139,105,20,0.15);
  }
  .qr-zone img { display: block; border-radius: 6px; width: 230px; height: 230px; }
  .contact-row {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 8px 12px;
    background: rgba(139,105,20,0.08);
    border-radius: 10px; margin-bottom: 8px;
  }
  .contact-icon {
    width: 32px; height: 32px;
    background: #8B6914; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .contact-icon svg { fill: #FFF8F0; }
  .contact-text { font-size: 13px; color: #3E2A1A; font-weight: 600; }
  .btn-save {
    margin-top: 14px; width: 100%;
    background: #8B6914; color: #FFF8F0;
    border: none; border-radius: 14px;
    padding: 15px 20px; font-size: 16px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 10px;
    box-shadow: 0 4px 15px rgba(139,105,20,0.3);
    text-decoration: none; transition: transform 0.1s;
  }
  .btn-save:active { transform: scale(0.97); }
  .btn-save svg { fill: #FFF8F0; flex-shrink: 0; }
  .footer {
    margin-top: 12px; text-align: center;
    font-size: 11px; color: #8B6914; opacity: 0.6;
  }
</style>
</head>
